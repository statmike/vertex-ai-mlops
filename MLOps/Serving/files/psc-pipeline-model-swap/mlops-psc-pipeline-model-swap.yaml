          \ endpoint.traffic_split.get(deployed.id, 0)\n        print(f'  {deployed.display_name}:\
          \ id={deployed.id}, traffic={traffic}%')\n        if deployed.display_name\
          \ == target_display_name:\n            target_id = deployed.id\n\n    if\
          \ target_id is None:\n        print(f'\\nFAIL: {target_display_name} not\
          \ found on endpoint')\n        return False\n\n    target_traffic = endpoint.traffic_split.get(target_id,\
          \ 0)\n    if target_traffic != 100:\n        print(f'\\nFAIL: {target_display_name}\
          \ has {target_traffic}% traffic, expected 100%')\n        return False\n\
          \n    print(f'\\nVerified: {target_display_name} is deployed with 100% traffic')\n\
          \    return True\n\n"
