          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef verify_deployment(\n    project: str,\n    region: str,\n   \
          \ endpoint_artifact: Input[Artifact],\n    model_artifact: Input[Model],\n\
          ) -> bool:\n    \"\"\"Verify the target model is deployed and receiving\
          \ 100% traffic.\n\n    Reads endpoint and target model from upstream artifacts.\
          \ PSC forwarding\n    rules are not transitive through VPC peering, so pipeline\
          \ workers cannot\n    reach the PSC IP directly. This component validates\
          \ the deployment via\n    the management API instead. Prediction testing\
