          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef verify_endpoint(\n    project: str,\n    region: str,\n    endpoint_resource_name:\
          \ str,\n    endpoint_artifact: Output[Artifact],\n    serving_model_artifact:\
          \ Output[Model],\n) -> str:\n    \"\"\"Verify endpoint exists, list current\
          \ deployments, and create artifacts.\n\n    Creates two artifacts for downstream\
          \ components and lineage:\n    - endpoint_artifact (dsl.Artifact) \u2014\
          \ the PSC endpoint with display name, ID, and type\n    - serving_model_artifact\
          \ (dsl.Model) \u2014 the model currently receiving traffic, including\n\
          \      its Model Registry resource name and version so lineage tracks what\
          \ was replaced\n    \"\"\"\n    from google.cloud import aiplatform\n  \
          \  import json\n\n    aiplatform.init(project=project, location=region)\n\
          \    endpoint = aiplatform.PrivateEndpoint(endpoint_resource_name)\n\n \
          \   # Populate the endpoint artifact\n    endpoint_artifact.uri = endpoint.resource_name\n\
          \    endpoint_artifact.metadata['display_name'] = endpoint.display_name\n\
          \    endpoint_artifact.metadata['endpoint_id'] = endpoint.name.split('/')[-1]\n\
          \    endpoint_artifact.metadata['endpoint_type'] = 'PSC'\n    endpoint_artifact.metadata['project']\
          \ = project\n    endpoint_artifact.metadata['region'] = region\n\n    deployments\
          \ = []\n    serving_model = None\n    for model in endpoint.list_models():\n\
          \        traffic = endpoint.traffic_split.get(model.id, 0)\n        deployments.append({\n\
          \            'id': model.id,\n            'display_name': model.display_name,\n\
          \            'traffic_pct': traffic,\n        })\n        print(f'  Deployed:\
          \ {model.display_name} (id={model.id}, traffic={traffic}%)')\n        #\
          \ Track the model currently serving traffic\n        if traffic > 0 and\
          \ (serving_model is None or traffic > serving_model['traffic_pct']):\n \
          \           serving_model = {\n                'id': model.id,\n       \
          \         'display_name': model.display_name,\n                'traffic_pct':\
          \ traffic,\n                'model_resource_name': model.model,\n      \
          \          'model_version_id': model.model_version_id or 'default',\n  \
          \          }\n\n    # Populate the serving model artifact\n    if serving_model:\n\
          \        serving_model_artifact.uri = serving_model['model_resource_name']\n\
          \        serving_model_artifact.metadata['display_name'] = serving_model['display_name']\n\
          \        serving_model_artifact.metadata['deployed_model_id'] = serving_model['id']\n\
          \        serving_model_artifact.metadata['version_id'] = serving_model['model_version_id']\n\
          \        serving_model_artifact.metadata['traffic_pct'] = serving_model['traffic_pct']\n\
          \        print(f'\\nServing model: {serving_model[\"display_name\"]} (version:\
          \ {serving_model[\"model_version_id\"]})')\n    else:\n        serving_model_artifact.uri\
          \ = 'none'\n        serving_model_artifact.metadata['display_name'] = 'none'\n\
          \        print('\\nNo model currently serving traffic')\n\n    print(f'Endpoint\
          \ {endpoint.display_name} verified with {len(deployments)} deployed model(s)')\n\
          \    return json.dumps(deployments)\n\n"
