# PIPELINE DEFINITION
# Name: mlops-psc-pipeline-model-swap
# Description: Automated model swap on PSC private endpoint
# Inputs:
#    deployed_model_display_name: str
#    endpoint_resource_name: str
#    machine_type: str [Default: 'n1-standard-4']
#    max_replicas: int [Default: 2.0]
#    min_replicas: int [Default: 1.0]
#    model_resource_name: str
#    notification_email: str [Default: '']
#    project: str
#    region: str
#    wait_seconds: int [Default: 15.0]
components:
  comp-condition-3:
    dag:
      tasks:
        undeploy-old-models:
          cachingOptions:
            enableCache: true
          componentRef:
            name: comp-undeploy-old-models
          inputs:
            artifacts:
              endpoint_artifact:
                componentInputArtifact: pipelinechannel--verify-endpoint-endpoint_artifact
              model_artifact:
                componentInputArtifact: pipelinechannel--deploy-model-model_artifact
              serving_model_artifact:
                componentInputArtifact: pipelinechannel--verify-endpoint-serving_model_artifact
            parameters:
              project:
                componentInputParameter: pipelinechannel--project
              region:
                componentInputParameter: pipelinechannel--region
          taskInfo:
            name: Undeploy Previous Model
    inputDefinitions:
      artifacts:
        pipelinechannel--deploy-model-model_artifact:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
        pipelinechannel--verify-endpoint-endpoint_artifact:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
        pipelinechannel--verify-endpoint-serving_model_artifact:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
      parameters:
        pipelinechannel--project:
          parameterType: STRING
        pipelinechannel--region:
          parameterType: STRING
        pipelinechannel--verify-deployment-Output:
          parameterType: BOOLEAN
  comp-condition-4:
    dag:
      tasks:
        rollback-traffic:
          cachingOptions:
            enableCache: true
          componentRef:
            name: comp-rollback-traffic
          inputs:
            artifacts:
              endpoint_artifact:
                componentInputArtifact: pipelinechannel--verify-endpoint-endpoint_artifact
              model_artifact:
                componentInputArtifact: pipelinechannel--deploy-model-model_artifact
              serving_model_artifact:
                componentInputArtifact: pipelinechannel--verify-endpoint-serving_model_artifact
            parameters:
              project:
                componentInputParameter: pipelinechannel--project
              region:
                componentInputParameter: pipelinechannel--region
              wait_seconds:
                componentInputParameter: pipelinechannel--wait_seconds
          taskInfo:
            name: Rollback to Previous Model
    inputDefinitions:
      artifacts:
        pipelinechannel--deploy-model-model_artifact:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
        pipelinechannel--verify-endpoint-endpoint_artifact:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
        pipelinechannel--verify-endpoint-serving_model_artifact:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
      parameters:
        pipelinechannel--project:
          parameterType: STRING
        pipelinechannel--region:
          parameterType: STRING
        pipelinechannel--verify-deployment-Output:
          parameterType: BOOLEAN
        pipelinechannel--wait_seconds:
          parameterType: NUMBER_INTEGER
  comp-condition-branches-2:
    dag:
      tasks:
        condition-3:
          componentRef:
            name: comp-condition-3
          inputs:
            artifacts:
              pipelinechannel--deploy-model-model_artifact:
                componentInputArtifact: pipelinechannel--deploy-model-model_artifact
              pipelinechannel--verify-endpoint-endpoint_artifact:
                componentInputArtifact: pipelinechannel--verify-endpoint-endpoint_artifact
              pipelinechannel--verify-endpoint-serving_model_artifact:
                componentInputArtifact: pipelinechannel--verify-endpoint-serving_model_artifact
            parameters:
              pipelinechannel--project:
                componentInputParameter: pipelinechannel--project
              pipelinechannel--region:
                componentInputParameter: pipelinechannel--region
              pipelinechannel--verify-deployment-Output:
                componentInputParameter: pipelinechannel--verify-deployment-Output
          taskInfo:
            name: Deployment Verified
          triggerPolicy:
            condition: inputs.parameter_values['pipelinechannel--verify-deployment-Output']
              == true
        condition-4:
          componentRef:
            name: comp-condition-4
          inputs:
            artifacts:
              pipelinechannel--deploy-model-model_artifact:
                componentInputArtifact: pipelinechannel--deploy-model-model_artifact
              pipelinechannel--verify-endpoint-endpoint_artifact:
                componentInputArtifact: pipelinechannel--verify-endpoint-endpoint_artifact
              pipelinechannel--verify-endpoint-serving_model_artifact:
                componentInputArtifact: pipelinechannel--verify-endpoint-serving_model_artifact
            parameters:
              pipelinechannel--project:
                componentInputParameter: pipelinechannel--project
              pipelinechannel--region:
                componentInputParameter: pipelinechannel--region
              pipelinechannel--verify-deployment-Output:
                componentInputParameter: pipelinechannel--verify-deployment-Output
              pipelinechannel--wait_seconds:
                componentInputParameter: pipelinechannel--wait_seconds
          taskInfo:
            name: Verification Failed - Rollback
          triggerPolicy:
            condition: '!(inputs.parameter_values[''pipelinechannel--verify-deployment-Output'']
              == true)'
    inputDefinitions:
      artifacts:
        pipelinechannel--deploy-model-model_artifact:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
        pipelinechannel--verify-endpoint-endpoint_artifact:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
        pipelinechannel--verify-endpoint-serving_model_artifact:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
      parameters:
        pipelinechannel--project:
          parameterType: STRING
        pipelinechannel--region:
          parameterType: STRING
        pipelinechannel--verify-deployment-Output:
          parameterType: BOOLEAN
        pipelinechannel--wait_seconds:
          parameterType: NUMBER_INTEGER
  comp-deploy-model:
    executorLabel: exec-deploy-model
    inputDefinitions:
      artifacts:
        endpoint_artifact:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
      parameters:
        deployed_model_display_name:
          parameterType: STRING
        machine_type:
          parameterType: STRING
        max_replicas:
          parameterType: NUMBER_INTEGER
        min_replicas:
          parameterType: NUMBER_INTEGER
        model_resource_name:
          parameterType: STRING
        project:
          parameterType: STRING
        region:
          parameterType: STRING
    outputDefinitions:
      artifacts:
        model_artifact:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
      parameters:
        Output:
          parameterType: STRING
  comp-exit-handler-1:
    dag:
      tasks:
        condition-branches-2:
          componentRef:
            name: comp-condition-branches-2
          dependentTasks:
          - deploy-model
          - verify-deployment
          - verify-endpoint
          inputs:
            artifacts:
              pipelinechannel--deploy-model-model_artifact:
                taskOutputArtifact:
                  outputArtifactKey: model_artifact
                  producerTask: deploy-model
              pipelinechannel--verify-endpoint-endpoint_artifact:
                taskOutputArtifact:
                  outputArtifactKey: endpoint_artifact
                  producerTask: verify-endpoint
              pipelinechannel--verify-endpoint-serving_model_artifact:
                taskOutputArtifact:
                  outputArtifactKey: serving_model_artifact
                  producerTask: verify-endpoint
            parameters:
              pipelinechannel--project:
                componentInputParameter: pipelinechannel--project
              pipelinechannel--region:
                componentInputParameter: pipelinechannel--region
              pipelinechannel--verify-deployment-Output:
                taskOutputParameter:
                  outputParameterKey: Output
                  producerTask: verify-deployment
              pipelinechannel--wait_seconds:
                componentInputParameter: pipelinechannel--wait_seconds
          taskInfo:
            name: condition-branches-2
        deploy-model:
          cachingOptions:
            enableCache: true
          componentRef:
            name: comp-deploy-model
          dependentTasks:
          - verify-endpoint
          inputs:
            artifacts:
              endpoint_artifact:
                taskOutputArtifact:
                  outputArtifactKey: endpoint_artifact
                  producerTask: verify-endpoint
            parameters:
              deployed_model_display_name:
                componentInputParameter: pipelinechannel--deployed_model_display_name
              machine_type:
                componentInputParameter: pipelinechannel--machine_type
              max_replicas:
                componentInputParameter: pipelinechannel--max_replicas
              min_replicas:
                componentInputParameter: pipelinechannel--min_replicas
              model_resource_name:
                componentInputParameter: pipelinechannel--model_resource_name
              project:
                componentInputParameter: pipelinechannel--project
              region:
                componentInputParameter: pipelinechannel--region
          taskInfo:
            name: Deploy New Model (0% Traffic)
        shift-traffic:
          cachingOptions:
            enableCache: true
          componentRef:
            name: comp-shift-traffic
          dependentTasks:
          - deploy-model
          - verify-endpoint
          inputs:
            artifacts:
              endpoint_artifact:
                taskOutputArtifact:
                  outputArtifactKey: endpoint_artifact
                  producerTask: verify-endpoint
              model_artifact:
                taskOutputArtifact:
                  outputArtifactKey: model_artifact
                  producerTask: deploy-model
            parameters:
              project:
                componentInputParameter: pipelinechannel--project
              region:
                componentInputParameter: pipelinechannel--region
              wait_seconds:
                componentInputParameter: pipelinechannel--wait_seconds
          taskInfo:
            name: Shift Traffic to New Model
        verify-deployment:
          cachingOptions:
            enableCache: true
          componentRef:
            name: comp-verify-deployment
          dependentTasks:
          - deploy-model
          - shift-traffic
          - verify-endpoint
          inputs:
            artifacts:
              endpoint_artifact:
                taskOutputArtifact:
                  outputArtifactKey: endpoint_artifact
                  producerTask: verify-endpoint
              model_artifact:
                taskOutputArtifact:
                  outputArtifactKey: model_artifact
                  producerTask: deploy-model
            parameters:
              project:
                componentInputParameter: pipelinechannel--project
              region:
                componentInputParameter: pipelinechannel--region
          taskInfo:
            name: Verify Deployment
        verify-endpoint:
          cachingOptions:
            enableCache: true
          componentRef:
            name: comp-verify-endpoint
          inputs:
            parameters:
              endpoint_resource_name:
                componentInputParameter: pipelinechannel--endpoint_resource_name
              project:
                componentInputParameter: pipelinechannel--project
              region:
                componentInputParameter: pipelinechannel--region
          taskInfo:
            name: Verify PSC Endpoint
    inputDefinitions:
      parameters:
        pipelinechannel--deployed_model_display_name:
          parameterType: STRING
        pipelinechannel--endpoint_resource_name:
          parameterType: STRING
        pipelinechannel--machine_type:
          parameterType: STRING
        pipelinechannel--max_replicas:
          parameterType: NUMBER_INTEGER
        pipelinechannel--min_replicas:
          parameterType: NUMBER_INTEGER
        pipelinechannel--model_resource_name:
          parameterType: STRING
        pipelinechannel--project:
          parameterType: STRING
        pipelinechannel--region:
          parameterType: STRING
        pipelinechannel--wait_seconds:
          parameterType: NUMBER_INTEGER
  comp-notify-status:
    executorLabel: exec-notify-status
    inputDefinitions:
      parameters:
        notification_email:
          parameterType: STRING
        status:
          isOptional: true
          parameterType: TASK_FINAL_STATUS
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
  comp-rollback-traffic:
    executorLabel: exec-rollback-traffic
    inputDefinitions:
      artifacts:
        endpoint_artifact:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
        model_artifact:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
        serving_model_artifact:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
      parameters:
        project:
          parameterType: STRING
        region:
          parameterType: STRING
        wait_seconds:
          parameterType: NUMBER_INTEGER
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
  comp-shift-traffic:
    executorLabel: exec-shift-traffic
    inputDefinitions:
      artifacts:
        endpoint_artifact:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
        model_artifact:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
      parameters:
        project:
          parameterType: STRING
        region:
          parameterType: STRING
        wait_seconds:
          parameterType: NUMBER_INTEGER
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
  comp-undeploy-old-models:
    executorLabel: exec-undeploy-old-models
    inputDefinitions:
      artifacts:
        endpoint_artifact:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
        model_artifact:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
        serving_model_artifact:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
      parameters:
        project:
          parameterType: STRING
        region:
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
  comp-verify-deployment:
    executorLabel: exec-verify-deployment
    inputDefinitions:
      artifacts:
        endpoint_artifact:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
        model_artifact:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
      parameters:
        project:
          parameterType: STRING
        region:
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: BOOLEAN
  comp-verify-endpoint:
    executorLabel: exec-verify-endpoint
    inputDefinitions:
      parameters:
        endpoint_resource_name:
          parameterType: STRING
        project:
          parameterType: STRING
        region:
          parameterType: STRING
    outputDefinitions:
      artifacts:
        endpoint_artifact:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
        serving_model_artifact:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
      parameters:
        Output:
          parameterType: STRING
defaultPipelineRoot: gs://statmike-mlops-349915/mlops/psc-pipeline-model-swap/pipeline_root
deploymentSpec:
  executors:
    exec-deploy-model:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - deploy_model
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'google-cloud-aiplatform'\
          \  &&  python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef deploy_model(\n    project: str,\n    region: str,\n    endpoint_artifact:\
          \ Input[Artifact],\n    model_resource_name: str,\n    deployed_model_display_name:\
          \ str,\n    machine_type: str,\n    min_replicas: int,\n    max_replicas:\
          \ int,\n    model_artifact: Output[Model],\n) -> str:\n    \"\"\"Deploy\
          \ model at 0% traffic and create a model artifact.\n\n    Reads the endpoint\
          \ from the upstream artifact. Creates a model artifact\n    (dsl.Model)\
          \ with the registry resource name as URI and deployment details\n    as\
          \ metadata \u2014 including the model version if a versioned resource name\n\
          \    (e.g., models/123@1) was provided.\n    \"\"\"\n    from google.cloud\
          \ import aiplatform\n\n    aiplatform.init(project=project, location=region)\n\
          \    endpoint_resource_name = endpoint_artifact.uri\n    endpoint = aiplatform.PrivateEndpoint(endpoint_resource_name)\n\
          \    model = aiplatform.Model(model_resource_name)\n\n    # Populate the\
          \ model artifact for downstream components and lineage\n    model_artifact.uri\
          \ = model.resource_name\n    model_artifact.metadata['display_name'] = model.display_name\n\
          \    model_artifact.metadata['model_id'] = model.name.split('/')[-1]\n \
          \   model_artifact.metadata['version_id'] = str(model.version_id) if model.version_id\
          \ else 'default'\n    model_artifact.metadata['deployed_model_display_name']\
          \ = deployed_model_display_name\n    model_artifact.metadata['machine_type']\
          \ = machine_type\n\n    # Check if already deployed\n    for deployed in\
          \ endpoint.list_models():\n        if deployed.display_name == deployed_model_display_name:\n\
          \            print(f'{deployed_model_display_name} is already deployed (id={deployed.id}),\
          \ skipping deploy')\n            model_artifact.metadata['deployed_model_id']\
          \ = deployed.id\n            model_artifact.metadata['action'] = 'skipped'\n\
          \            return deployed_model_display_name\n\n    # Deploy at 0% traffic\n\
          \    print(f'Deploying {model.display_name} as {deployed_model_display_name}\
          \ at 0% traffic ...')\n    endpoint.deploy(\n        model=model,\n    \
          \    deployed_model_display_name=deployed_model_display_name,\n        machine_type=machine_type,\n\
          \        min_replica_count=min_replicas,\n        max_replica_count=max_replicas,\n\
          \        traffic_percentage=0,\n    )\n    print(f'Deploy complete. Traffic\
          \ split: {endpoint.traffic_split}')\n\n    # Record the deployed model ID\n\
          \    for deployed in endpoint.list_models():\n        if deployed.display_name\
          \ == deployed_model_display_name:\n            model_artifact.metadata['deployed_model_id']\
          \ = deployed.id\n    model_artifact.metadata['action'] = 'deployed'\n\n\
          \    print(f'Model artifact URI: {model_artifact.uri} (version: {model_artifact.metadata[\"\
          version_id\"]})')\n    return deployed_model_display_name\n\n"
        image: python:3.10
    exec-notify-status:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - notify_status
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef notify_status(\n    status: dsl.PipelineTaskFinalStatus,\n  \
          \  notification_email: str,\n) -> str:\n    \"\"\"Log pipeline completion\
          \ status. In production, integrate with email/Pub/Sub.\"\"\"\n    import\
          \ json\n\n    result = {\n        'state': status.state,\n        'pipeline_job':\
          \ status.pipeline_job_resource_name,\n        'error': getattr(status, 'error_message',\
          \ None),\n    }\n\n    if status.state == 'SUCCEEDED':\n        print(f'Pipeline\
          \ SUCCEEDED')\n    else:\n        print(f'Pipeline {status.state}: {result.get(\"\
          error\", \"unknown error\")}')\n\n    print(f'Would notify: {notification_email}')\n\
          \    print(f'Full status: {json.dumps(result, indent=2)}')\n\n    return\
          \ json.dumps(result)\n\n"
        image: python:3.10
    exec-rollback-traffic:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - rollback_traffic
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'google-cloud-aiplatform'\
          \  &&  python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef rollback_traffic(\n    project: str,\n    region: str,\n    endpoint_artifact:\
          \ Input[Artifact],\n    model_artifact: Input[Model],\n    serving_model_artifact:\
          \ Input[Model],\n    wait_seconds: int,\n) -> str:\n    \"\"\"Roll back\
          \ traffic to the previous serving model.\n\n    Uses the serving_model_artifact\
          \ to precisely identify the known-good model,\n    rather than shifting\
          \ to \"any model that isn't the failed one.\"\n    \"\"\"\n    from google.cloud\
          \ import aiplatform\n    import time\n\n    aiplatform.init(project=project,\
          \ location=region)\n    endpoint = aiplatform.PrivateEndpoint(endpoint_artifact.uri)\n\
          \    failed_display_name = model_artifact.metadata['deployed_model_display_name']\n\
          \    rollback_display_name = serving_model_artifact.metadata['display_name']\n\
          \n    print(f'Rolling back: {failed_display_name} -> 0%, {rollback_display_name}\
          \ -> 100%')\n    print(f'Restoring to: {serving_model_artifact.uri} (version:\
          \ {serving_model_artifact.metadata[\"version_id\"]})')\n\n    new_split\
          \ = {}\n    for deployed in endpoint.list_models():\n        if deployed.display_name\
          \ == rollback_display_name:\n            new_split[deployed.id] = 100\n\
          \        else:\n            new_split[deployed.id] = 0\n\n    endpoint.update(traffic_split=new_split)\n\
          \n    print(f'Waiting {wait_seconds}s for traffic routing to propagate ...')\n\
          \    time.sleep(wait_seconds)\n\n    print(f'Rollback complete. Traffic\
          \ restored to {rollback_display_name}')\n    return rollback_display_name\n\
          \n"
        image: python:3.10
    exec-shift-traffic:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - shift_traffic
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'google-cloud-aiplatform'\
          \  &&  python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef shift_traffic(\n    project: str,\n    region: str,\n    endpoint_artifact:\
          \ Input[Artifact],\n    model_artifact: Input[Model],\n    wait_seconds:\
          \ int,\n) -> str:\n    \"\"\"Shift 100% traffic to the target model, 0%\
          \ to all others. Wait for propagation.\n\n    Reads endpoint and target\
          \ model from upstream artifacts.\n    \"\"\"\n    from google.cloud import\
          \ aiplatform\n    import time\n\n    aiplatform.init(project=project, location=region)\n\
          \    endpoint = aiplatform.PrivateEndpoint(endpoint_artifact.uri)\n    target_display_name\
          \ = model_artifact.metadata['deployed_model_display_name']\n\n    old_split\
          \ = dict(endpoint.traffic_split)\n    print(f'Current traffic split: {old_split}')\n\
          \n    # Build new split: 100% to target, 0% to everything else\n    new_split\
          \ = {}\n    target_found = False\n    for deployed in endpoint.list_models():\n\
          \        if deployed.display_name == target_display_name:\n            new_split[deployed.id]\
          \ = 100\n            target_found = True\n        else:\n            new_split[deployed.id]\
          \ = 0\n\n    if not target_found:\n        raise RuntimeError(f'Model {target_display_name}\
