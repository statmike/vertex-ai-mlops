pipelineInfo:
  description: Automated model swap on PSC private endpoint
  name: mlops-psc-pipeline-model-swap
root:
  dag:
    tasks:
      exit-handler-1:
        componentRef:
          name: comp-exit-handler-1
        inputs:
          parameters:
            pipelinechannel--deployed_model_display_name:
              componentInputParameter: deployed_model_display_name
            pipelinechannel--endpoint_resource_name:
              componentInputParameter: endpoint_resource_name
            pipelinechannel--machine_type:
              componentInputParameter: machine_type
            pipelinechannel--max_replicas:
              componentInputParameter: max_replicas
            pipelinechannel--min_replicas:
              componentInputParameter: min_replicas
            pipelinechannel--model_resource_name:
              componentInputParameter: model_resource_name
            pipelinechannel--project:
              componentInputParameter: project
            pipelinechannel--region:
              componentInputParameter: region
            pipelinechannel--wait_seconds:
              componentInputParameter: wait_seconds
        taskInfo:
          name: Model Swap with Notification
      notify-status:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-notify-status
        dependentTasks:
        - exit-handler-1
        inputs:
          parameters:
            notification_email:
              componentInputParameter: notification_email
            status:
              taskFinalStatus:
                producerTask: exit-handler-1
        taskInfo:
          name: Notify Status
        triggerPolicy:
          strategy: ALL_UPSTREAM_TASKS_COMPLETED
  inputDefinitions:
    parameters:
      deployed_model_display_name:
        parameterType: STRING
      endpoint_resource_name:
        parameterType: STRING
      machine_type:
        defaultValue: n1-standard-4
        isOptional: true
        parameterType: STRING
      max_replicas:
        defaultValue: 2.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      min_replicas:
        defaultValue: 1.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      model_resource_name:
        parameterType: STRING
      notification_email:
        defaultValue: ''
        isOptional: true
        parameterType: STRING
      project:
        parameterType: STRING
      region:
        parameterType: STRING
      wait_seconds:
        defaultValue: 15.0
        isOptional: true
        parameterType: NUMBER_INTEGER
