          \ after the pipeline.\n    \"\"\"\n    from google.cloud import aiplatform\n\
          \n    aiplatform.init(project=project, location=region)\n    endpoint =\
          \ aiplatform.PrivateEndpoint(endpoint_artifact.uri)\n    target_display_name\
          \ = model_artifact.metadata['deployed_model_display_name']\n\n    target_id\
