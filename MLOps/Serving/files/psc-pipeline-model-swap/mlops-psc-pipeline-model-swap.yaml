          \   endpoint_artifact: Input[Artifact],\n    model_artifact: Input[Model],\n\
          \    serving_model_artifact: Input[Model],\n) -> str:\n    \"\"\"Undeploy\
          \ the previous serving model tracked by the serving_model_artifact.\n\n\
          \    Uses the serving_model_artifact to precisely identify the old model\
          \ to remove,\n    rather than undeploying everything except the new model.\n\
          \    \"\"\"\n    from google.cloud import aiplatform\n    import json\n\n\
          \    aiplatform.init(project=project, location=region)\n    endpoint = aiplatform.PrivateEndpoint(endpoint_artifact.uri)\n\
          \    keep_display_name = model_artifact.metadata['deployed_model_display_name']\n\
          \    old_display_name = serving_model_artifact.metadata['display_name']\n\
          \n    removed = []\n    for deployed in endpoint.list_models():\n      \
          \  if deployed.display_name == old_display_name:\n            print(f'Undeploying\
          \ previous serving model: {deployed.display_name} (id={deployed.id})')\n\
          \            print(f'  Registry: {serving_model_artifact.uri} (version:\
          \ {serving_model_artifact.metadata[\"version_id\"]})')\n            endpoint.undeploy(deployed_model_id=deployed.id)\n\
          \            removed.append(deployed.display_name)\n\n    print(f'\\nRemaining\
          \ deployed models:')\n    for m in endpoint.list_models():\n        print(f'\
          \  {m.display_name} \u2014 traffic: {endpoint.traffic_split.get(m.id, 0)}%')\n\
          \n    return json.dumps(removed)\n\n"
