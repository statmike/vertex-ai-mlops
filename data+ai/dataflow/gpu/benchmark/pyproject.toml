[project]
name = "benchmark"
version = "0.1.0"
requires-python = ">=3.11,<3.13"
dependencies = [
    "apache-beam[gcp]>=2.61.0",
    "torch>=2.1.0",
    "transformers>=4.36.0",
    "google-cloud-pubsub>=2.18.0",
    "google-auth>=2.23.0",
    "requests>=2.31.0",
    "numpy>=1.24.0",
    "flask>=3.0.0",
    "gunicorn>=21.2.0",
    "matplotlib>=3.10.8",
]

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["benchmark*"]
